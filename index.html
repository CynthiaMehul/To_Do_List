<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffc0d9 0%, #ffb6d9 100%);
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: #fff0f5;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            padding: 30px;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #ff69b4;
            text-align: center;
            margin-bottom: 25px;
            font-size: 32px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ffb6d9;
            border-radius: 10px;
            font-size: 16px;
            background-color: white;
        }

        input:focus {
            outline: none;
            border-color: #ff69b4;
        }

        button {
            padding: 12px 20px;
            background-color: #ff69b4;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        ul {
            list-style: none;
        }

        li {
            background-color: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-text {
            flex: 1;
            cursor: pointer;
            color: #333;
            font-size: 16px;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: #ccc;
        }

        .btn-delete {
            background-color: #ff9999;
            padding: 8px 15px;
            font-size: 14px;
            margin-left: 10px;
        }

        .empty-message {
            text-align: center;
            color: #ffb6d9;
            padding: 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        
        <div class="input-group">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Add a new task..."
                onkeypress="if(event.key==='Enter') addTask()"
            >
            <button onclick="addTask()">Add</button>
        </div>

        <ul id="taskList">
            <div class="empty-message">No tasks yet! Add one</div>
        </ul>
    </div>

    <script>
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskList = document.getElementById('taskList');
            const taskText = input.value.trim();

            if (taskText === '') {
                alert('Please enter a task!');
                return;
            }

            // Create list item
            const li = document.createElement('li');
            
            // Create task text span
            const span = document.createElement('span');
            span.className = 'task-text';
            span.textContent = taskText;
            span.onclick = function() {
                this.classList.toggle('completed');
            };

            // Create delete button
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-delete';
            deleteBtn.textContent = 'Delete';
            deleteBtn.onclick = function() {
                li.remove();
            };

            // Add elements to list item
            li.appendChild(span);
            li.appendChild(deleteBtn);

            // Clear empty message if exists
            const emptyMsg = taskList.querySelector('.empty-message');
            if (emptyMsg) {
                emptyMsg.remove();
            }

            // Add to list
            taskList.appendChild(li);

            // Clear input
            input.value = '';
            input.focus();
        }
    </script>
</body>
</html>
